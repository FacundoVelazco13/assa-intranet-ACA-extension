<div class="dossier-info-container">
  <mat-card class="dossier-info-main-card">
    <mat-card-header>
      <mat-card-title>{{ getPropertyValue({ key: 'cm:title', label: 'Title' }) }}</mat-card-title>
      <mat-card-subtitle>{{ typeName }}</mat-card-subtitle>
    </mat-card-header>
  </mat-card>

  <!-- Descripción Card destacada -->
  <mat-card class="description-card" *ngIf="node?.properties?.['cm:description']">
    <mat-card-content>
      <div class="description-header">
        <div class="description-title-group">
          <mat-icon class="description-icon">description</mat-icon>
          <h3>Descripción</h3>
        </div>
        <button
          type="button"
          mat-icon-button
          class="description-toggle-button"
          (click)="toggleDescriptionExpansion()"
          [attr.aria-label]="isDescriptionExpanded ? 'Contraer descripción' : 'Expandir descripción'"
          [attr.title]="isDescriptionExpanded ? 'Contraer' : 'Expandir'"
        >
          <mat-icon>{{ isDescriptionExpanded ? 'expand_less' : 'expand_more' }}</mat-icon>
        </button>
      </div>
      <p class="aca-dossier-description" [class.expanded]="isDescriptionExpanded">{{ node?.properties?.['cm:description'] }}</p>
    </mat-card-content>
  </mat-card>

  <!-- Grid de propiedades -->
  <div class="properties-grid">
    <mat-card class="property-card" *ngFor="let property of properties">
      <mat-card-content>
        <div class="property-icon-wrapper" *ngIf="property.icon">
          <mat-icon class="property-icon">{{ property.icon }}</mat-icon>
        </div>
        <div class="property-label">{{ property.label }}</div>
        <div class="property-value">{{ getPropertyValue(property) }}</div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
