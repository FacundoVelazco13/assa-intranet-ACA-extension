<div class="navbar-personal-wrapper">
  <button 
    class="navbar-button navbar-button--dropdown"
    [class.navbar-button--open]="isOpen"
    (click)="toggleDropdown()"
    aria-label="Toggle personal menu">
    <span class="navbar-button__text">{{ title }}</span>
    <span class="navbar-button__toggle-icon" [class.navbar-button__toggle-icon--open]="isOpen">
      ▼
    </span>
  </button>

  @if (isOpen) {
    <nav class="navbar-dropdown">
      <div class="navbar-dropdown__items">
        @for (item of items; track trackByItemId($index, item)) {
          <a 
            class="navbar-dropdown__item"
            (click)="onNavigate(item.route)">
            {{ item.title }}
          </a>
        }
      </div>
    </nav>
  }
</div>
