<aca-page-layout>
  <div class="aca-page-layout-header">
    <h1 class="aca-page-title">
      {{ title }}
    </h1>
  </div>
  <div class="aca-page-layout-content">
    <div class="pc-content-area">
      <h2>{{ subtitle }}</h2>
      <p>{{ description }}</p>
      <p class="start-exploring">Para comenzar, utiliza la barra de navegación de la izquierda para acceder al contenido del área.</p>
    </div>
  </div>
</aca-page-layout>
